<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋遊戲 - 學校作業</title>
    <style>
        :root {
            --bg-color: #f0e4d7;
            --board-color: #dcb35c;
            --line-color: #000;
            --black-piece: #000;
            --white-piece: #fff;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(15, 30px);
            grid-template-rows: repeat(15, 30px);
            background-color: var(--board-color);
            padding: 15px;
            border: 2px solid #8b4513;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .cell {
            width: 30px;
            height: 30px;
            border: 0.5px solid var(--line-color);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .piece {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            z-index: 1;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .black {
            background-color: var(--black-piece);
        }

        .white {
            background-color: var(--white-piece);
            border: 1px solid #ccc;
        }

        .controls {
            margin-top: 30px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #8b4513;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #a0522d;
        }

        .winner-msg {
            color: #d9534f;
            font-size: 1.5rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>五子棋遊戲</h1>
    <div class="status" id="status">輪到：黑子</div>
    <div id="board"></div>
    <div class="winner-msg" id="winnerMsg">恭喜！黑子獲勝！</div>
    
    <div class="controls">
        <button onclick="resetGame()">重新開始</button>
    </div>

    <script>
        const BOARD_SIZE = 15;
        let currentPlayer = 'black'; // 'black' or 'white'
        let gameActive = true;
        let boardState = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));

        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const winnerMsgElement = document.getElementById('winnerMsg');

        // 初始化棋盤
        function initBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', () => handleMove(r, c));
                    boardElement.appendChild(cell);
                }
            }
        }

        // 處理下棋
        function handleMove(r, c) {
            if (!gameActive || boardState[r][c]) return;

            // 更新狀態
            boardState[r][c] = currentPlayer;
            renderPiece(r, c, currentPlayer);

            // 檢查勝負
            if (checkWin(r, c)) {
                gameActive = false;
                winnerMsgElement.textContent = `恭喜！${currentPlayer === 'black' ? '黑子' : '白子'}獲勝！`;
                winnerMsgElement.style.display = 'block';
                statusElement.textContent = '遊戲結束';
                return;
            }

            // 切換玩家
            currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
            statusElement.textContent = `輪到：${currentPlayer === 'black' ? '黑子' : '白子'}`;
        }

        // 渲染棋子
        function renderPiece(r, c, player) {
            const index = r * BOARD_SIZE + c;
            const cell = boardElement.children[index];
            const piece = document.createElement('div');
            piece.classList.add('piece', player);
            cell.appendChild(piece);
        }

        // 檢查勝利邏輯
        function checkWin(r, c) {
            const directions = [
                [[0, 1], [0, -1]], // 水平
                [[1, 0], [-1, 0]], // 垂直
                [[1, 1], [-1, -1]], // 正斜
                [[1, -1], [-1, 1]]  // 反斜
            ];

            for (let dir of directions) {
                let count = 1;
                for (let [dr, dc] of dir) {
                    let nr = r + dr;
                    let nc = c + dc;
                    while (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && boardState[nr][nc] === currentPlayer) {
                        count++;
                        nr += dr;
                        nc += dc;
                    }
                }
                if (count >= 5) return true;
            }
            return false;
        }

        // 重新開始
        function resetGame() {
            currentPlayer = 'black';
            gameActive = true;
            boardState = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
            statusElement.textContent = '輪到：黑子';
            winnerMsgElement.style.display = 'none';
            initBoard();
        }

        initBoard();
    </script>
</body>
</html>
